<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Analysis</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #results { margin-top: 20px; }
        .loading { display: none; }
    </style>
</head>
<body>
    <h1>Code Analysis Tool</h1>
    <textarea id="codeInput" rows="10" cols="50" placeholder="Enter your code here..."></textarea><br>
    <button id="analyzeBtn">Analyze</button>
    <div class="loading" id="loadingIndicator">Loading...</div>
    <div id="results">
        <h2>Analysis Results</h2>
        <div id="status"></div>
        <div id="issuesCount"></div>
        <div id="reportText"></div>
    </div>

    <script>
        document.getElementById('analyzeBtn').addEventListener('click', function() {
            const codeInput = document.getElementById('codeInput').value;
            const statusDiv = document.getElementById('status');
            const issuesDiv = document.getElementById('issuesCount');
            const reportDiv = document.getElementById('reportText');
            const loadingIndicator = document.getElementById('loadingIndicator');

            statusDiv.innerHTML = '';
            issuesDiv.innerHTML = '';
            reportDiv.innerHTML = '';
            loadingIndicator.style.display = 'block';

            fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: codeInput })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                loadingIndicator.style.display = 'none';
                statusDiv.innerHTML = 'Clean Status: ' + (data.clean ? 'Clean' : 'Issues found');
                issuesDiv.innerHTML = 'Issues Count: ' + data.issuesCount;
                reportDiv.innerHTML = 'Report: ' + data.report;
            })
            .catch(error => {
                loadingIndicator.style.display = 'none';
                statusDiv.innerHTML = 'Error: ' + error.message;
            });
        });
    </script>
</body>
</html>
