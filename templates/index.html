<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta-Code-Engine</title>
<style>

:root{
    --bg:#0b1220;
    --panel:#111a2e;
    --panel2:#0d1627;
    --accent:#3b82f6;
    --accentHover:#2563eb;
    --text:#e5e7eb;
    --muted:#94a3b8;
    --border:#1f2a44;
    --danger:#ef4444;
    --warn:#f59e0b;
    --good:#22c55e;
}

body{
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
    background:linear-gradient(180deg,#0b1220,#050814);
    color:var(--text);
    margin:0;
    padding:22px;
}

h1{
    text-align:center;
    margin-bottom:28px;
    font-weight:600;
    letter-spacing:.5px;
}

h2{
    margin-top:0;
    color:#cbd5f5;
}

.panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:20px;
    margin-bottom:28px;
    box-shadow:0 10px 25px rgba(0,0,0,.45);
    transition:.2s;
}

.panel:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 35px rgba(0,0,0,.55);
}

textarea{
    width:100%;
    height:220px;
    background:var(--panel2);
    color:#c7f9cc;
    border:1px solid var(--border);
    padding:12px;
    border-radius:10px;
    font-family:Consolas,monospace;
    resize:vertical;
    font-size:14px;
}

input[type="text"], input[type="file"]{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--panel2);
    color:var(--text);
    margin-top:5px;
}

button{
    margin-top:14px;
    padding:11px 18px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    font-weight:600;
    letter-spacing:.4px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:var(--accentHover);
}

.result{
    margin-top:14px;
    background:#020617;
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px;
    white-space:pre-wrap;
    min-height:140px;
    font-family:Consolas,monospace;
    font-size:14px;
    color:#facc15;
    overflow:auto;
}

.result:empty::before{
    content:"Results will appear here...";
    color:var(--muted);
}

</style>
</head>

<body>

<h1>Meta-Code-Engine Static Analyzer</h1>

<!-- SNIPPET ANALYZER -->
<div class="panel">
<h2>Analyze Code Snippet</h2>
<textarea id="codeInput" placeholder="Paste Python code here..."></textarea>
<button onclick="analyzeSnippet()">Analyze Snippet</button>
<div id="snippetResult" class="result"></div>
</div>

<!-- FILE UPLOAD -->
<div class="panel">
<h2>Upload Python File</h2>
<input type="file" id="fileInput" accept=".py">
<button onclick="uploadFile()">Analyze File</button>
<div id="fileResult" class="result"></div>
</div>

<!-- GITHUB SCANNER -->
<div class="panel">
<h2>Scan GitHub Repository</h2>
<input type="text" id="repoInput" placeholder="https://github.com/user/repository">
<button onclick="scanRepo()">Scan Repository</button>
<div id="repoResult" class="result"></div>
</div>

<script>

async function analyzeSnippet(){
    const code=document.getElementById("codeInput").value;
    const box=document.getElementById("snippetResult");
    box.textContent="Analyzing...";

    const res=await fetch("/analyze",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({code:code})
    });

    const data=await res.json();
    box.textContent=data.result || data.error;
}

async function uploadFile(){
    const file=document.getElementById("fileInput").files[0];
    const box=document.getElementById("fileResult");

    if(!file){
        box.textContent="Select a .py file first.";
        return;
    }

    const formData=new FormData();
    formData.append("file",file);

    box.textContent="Analyzing file...";

    const res=await fetch("/upload",{
        method:"POST",
        body:formData
    });

    const data=await res.json();
    box.textContent=data.result || data.error;
}

async function scanRepo(){
    const repo=document.getElementById("repoInput").value;
    const box=document.getElementById("repoResult");
    box.textContent="Scanning repository (may take ~15s)...";

    const res=await fetch("/github",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({repo:repo})
    });

    const data=await res.json();
    box.textContent=data.result || data.error;
}

</script>

</body>
</html>
