<!DOCTYPE html>
<html>
<head>
<title>Meta-Code Engine</title>

<style>
body{
    background:#0f172a;
    color:#e2e8f0;
    font-family: monospace;
    padding:20px;
}

h1{
    color:#38bdf8;
}

textarea{
    width:100%;
    height:300px;
    background:#020617;
    color:#e2e8f0;
    border:1px solid #334155;
    padding:10px;
    font-size:14px;
}

button{
    background:#0ea5e9;
    color:white;
    padding:10px 18px;
    border:none;
    margin-top:10px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#0284c7;
}

#output{
    margin-top:20px;
    white-space:pre-wrap;
}

.issue{
    border-left:4px solid #ef4444;
    padding:10px;
    margin-top:12px;
    background:#020617;
}

.safe{
    color:#22c55e;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>Meta-Code Engine</h1>

<textarea id="code">
q = request.args.get("q")
return "<h1>" + q + "</h1>"
</textarea>

<br>
<button onclick="runAnalysis()">Analyze Code</button>

<div id="output"></div>

<script>
async function runAnalysis(){

    const code = document.getElementById("code").value;

    const res = await fetch("/analyze",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({code:code})
    });

    const data = await res.json();

    const output = document.getElementById("output");
    output.innerHTML = "";

    if(data.status !== "ok"){
        output.innerText = "Server Error: " + data.error;
        return;
    }

    if(data.issues.length === 0){
        output.innerHTML = '<div class="safe">✔ No vulnerabilities found</div>';
        return;
    }

    data.issues.forEach(issue=>{
        const div = document.createElement("div");
        div.className = "issue";
        div.innerText = issue;
        output.appendChild(div);
    });
}
</script>

</body>
</html>
