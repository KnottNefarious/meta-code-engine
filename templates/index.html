<!DOCTYPE html>
<html>
<head>
<title>Meta Code Engine</title>
<style>
body{font-family:monospace;background:#0f172a;color:#e5e7eb;padding:20px}
textarea{width:100%;height:180px;background:#020617;color:#e5e7eb}
button{padding:10px;margin-top:10px}
pre{background:#020617;padding:12px;white-space:pre-wrap}
.section{margin-bottom:40px;border:1px solid #334155;padding:15px}
</style>
</head>

<body>

<h1>Meta-Code-Engine</h1>

<div class="section">
<h2>Analyze Code Snippet</h2>
<textarea id="code"></textarea><br>
<button onclick="analyze()">Analyze</button>
<pre id="result1"></pre>
</div>

<div class="section">
<h2>Upload Python Files</h2>
<input type="file" id="fileInput" multiple accept=".py"><br>
<button onclick="upload()">Scan Files</button>
<pre id="result2"></pre>
</div>

<div class="section">
<h2>Scan GitHub Repository</h2>
<input type="text" id="repo" placeholder="https://github.com/user/repo"><br>
<button onclick="github()">Scan Repo</button>
<pre id="result3"></pre>
</div>

<script>
async function analyze(){
const r=await fetch("/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code:code.value})});
const j=await r.json();
result1.textContent=j.result||j.error;
}

async function upload(){
const fd=new FormData();
for(const f of fileInput.files){fd.append("file",f);}
const r=await fetch("/upload",{method:"POST",body:fd});
const j=await r.json();
result2.textContent=j.result||j.error;
}

async function github(){
result3.textContent="Scanning repository...";
const r=await fetch("/github",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({repo:repo.value})});
const j=await r.json();
result3.textContent=j.result||j.error;
}
</script>

</body>
</html>
