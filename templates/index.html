<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta-Code-Engine</title>

<style>
body{
    background:#0f172a;
    color:#e2e8f0;
    font-family:monospace;
    margin:0;
    padding:0;
}

header{
    background:#020617;
    padding:14px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    border-bottom:1px solid #1e293b;
}

.container{
    padding:14px;
}

textarea{
    width:100%;
    height:220px;
    background:#020617;
    color:#e2e8f0;
    border:1px solid #334155;
    padding:10px;
    resize:vertical;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 14px;
    margin-top:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#1d4ed8;
}

input[type="text"]{
    width:100%;
    background:#020617;
    color:white;
    border:1px solid #334155;
    padding:8px;
}

hr{
    border:0;
    border-top:1px solid #334155;
    margin:18px 0;
}

#output{
    white-space:pre-wrap;
    background:#020617;
    border:1px solid #334155;
    padding:12px;
    margin-top:12px;
    min-height:160px;
}
</style>
</head>

<body>

<header>Meta-Code-Engine — Static Security Analyzer</header>

<div class="container">

<h3>Analyze Code Snippet</h3>
<textarea id="code" placeholder="Paste Python code here..."></textarea>
<button onclick="analyze()">Analyze</button>

<hr>

<h3>Upload Python Files (Phone or PC)</h3>
<input type="file" id="fileInput" multiple accept=".py">
<button onclick="uploadFiles()">Scan Uploaded Files</button>

<hr>

<h3>Scan GitHub Repository</h3>
<input type="text" id="githubUrl" placeholder="https://github.com/user/repository">
<button onclick="scanGithub()">Scan GitHub Repo</button>

<hr>

<h3>Results</h3>
<div id="output">Waiting for analysis...</div>

</div>

<script>

async function analyze(){
    const code = document.getElementById("code").value;

    const res = await fetch("/analyze",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({code:code})
    });

    const data = await res.json();
    displayResults(data);
}

async function uploadFiles(){
    const files = document.getElementById("fileInput").files;
    const formData = new FormData();

    for(let f of files){
        formData.append("files",f);
    }

    const res = await fetch("/upload",{
        method:"POST",
        body:formData
    });

    const data = await res.json();
    displayResults(data);
}

async function scanGithub(){
    const url = document.getElementById("githubUrl").value;

    const res = await fetch("/github",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:url})
    });

    const data = await res.json();
    displayResults(data);
}

function displayResults(data){
    const out = document.getElementById("output");

    if(data.error){
        out.textContent = "Error: " + data.error;
        return;
    }

    if(!data.issues || data.issues.length === 0){
        out.textContent = "No vulnerabilities detected ✔";
        return;
    }

    out.textContent =
        "Issues Found: " + data.issues.length + "\n\n" +
        data.issues.join("\n\n--------------------------------\n\n");
}

</script>

</body>
</html>
